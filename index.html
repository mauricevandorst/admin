<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiceDesk - Admin Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎋</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bamboo-theme.css">
</head>
<body class="flex flex-col min-h-screen">
    <!-- Navigation -->
    <nav class="bamboo-nav">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-8">
                    <h1 class="text-2xl font-bold flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" onclick="switchTab('dashboard')" title="Terug naar Dashboard">
                        <span class="text-3xl">🎋</span>
                        <span style="background: var(--gradient-bamboo); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">RiceDesk</span>
                    </h1>
                    <div class="hidden md:flex space-x-2">
                        <button onclick="switchTab('dashboard')" id="nav-dashboard" 
                                class="nav-button px-4 py-2 font-medium flex items-center gap-2">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </button>
                        <button onclick="switchTab('customers')" id="nav-customers" 
                                class="nav-button px-4 py-2 font-medium flex items-center gap-2">
                            <i class="fas fa-users"></i> Klanten
                        </button>
                        <button onclick="switchTab('invoices')" id="nav-invoices" 
                                class="nav-button px-4 py-2 font-medium flex items-center gap-2">
                            <i class="fas fa-file-invoice"></i> Facturen
                        </button>
                        <button onclick="switchTab('payments')" id="nav-payments" 
                                class="nav-button px-4 py-2 font-medium flex items-center gap-2">
                            <i class="fas fa-credit-card"></i> Betalingen
                        </button>
                        <button onclick="switchTab('subscriptions')" id="nav-subscriptions" 
                                class="nav-button px-4 py-2 font-medium flex items-center gap-2">
                            <i class="fas fa-sync"></i> Abonnementen
                        </button>
                        <button onclick="switchTab('reports')" id="nav-reports" 
                                class="nav-button px-4 py-2 font-medium flex items-center gap-2">
                            <i class="fas fa-chart-bar"></i> Rapporten
                        </button>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <!-- Desktop buttons -->
                    <button onclick="refreshCurrentView()" class="hidden md:flex btn-bamboo px-4 py-2 text-white items-center gap-2" title="Vernieuwen">
                        <i class="fas fa-refresh"></i>
                    </button>
                    <button onclick="showUserSettings()" class="hidden md:flex btn-wood px-4 py-2 text-white items-center gap-2" title="Instellingen">
                        <i class="fas fa-cog"></i>
                    </button>
                    <!-- Mobile hamburger button -->
                    <button onclick="toggleMobileMenu()" class="md:hidden btn-bamboo px-4 py-2 text-white flex items-center gap-2" id="hamburgerBtn" title="Menu">
                        <i class="fas fa-bars" id="hamburgerIcon"></i>
                    </button>
                </div>
            </div>
            <!-- Mobile menu -->
            <div id="mobileMenu" class="hidden md:hidden mt-4 space-y-2">
                <button onclick="switchTab('dashboard'); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button>
                <button onclick="switchTab('customers'); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                    <i class="fas fa-users"></i> Klanten
                </button>
                <button onclick="switchTab('invoices'); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                    <i class="fas fa-file-invoice"></i> Facturen
                </button>
                <button onclick="switchTab('payments'); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                    <i class="fas fa-credit-card"></i> Betalingen
                </button>
                <button onclick="switchTab('subscriptions'); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                    <i class="fas fa-sync"></i> Abonnementen
                </button>
                <button onclick="switchTab('reports'); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                    <i class="fas fa-chart-bar"></i> Rapporten
                </button>
                <div class="border-t border-gray-200 pt-2 mt-2">
                    <button onclick="refreshCurrentView(); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                        <i class="fas fa-refresh"></i> Vernieuwen
                    </button>
                    <button onclick="showUserSettings(); toggleMobileMenu();" class="nav-button block w-full text-left px-4 py-2 flex items-center gap-2">
                        <i class="fas fa-cog"></i> Instellingen
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- User Settings Modal -->
    <div id="userSettingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[9999]" style="backdrop-filter: blur(4px);">
        <div class="modal-premium w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col relative">
            <!-- Close button -->
            <button onclick="closeUserSettingsWithConfirmation()" 
                    class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 transition-colors text-gray-600 hover:text-gray-900 z-10"
                    title="Sluiten">
                <i class="fas fa-times text-xl"></i>
            </button>

            <div class="modal-header">
                <h2 class="text-2xl font-bold flex items-center gap-3 pr-10">
                    <div class="icon-premium icon-wood">
                        <i class="fas fa-user-cog"></i>
                    </div>
                    Persoonlijke Instellingen
                </h2>
            </div>
            <div class="modal-body overflow-y-auto">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">🎨 Thema</label>
                        <select id="settingTheme" class="input-premium w-full">
                            <option value="light">☀️ Licht</option>
                            <option value="dark">🌙 Donker</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">🌍 Taal</label>
                        <select id="settingLanguage" class="input-premium w-full">
                            <option value="nl">🇳🇱 Nederlands</option>
                            <option value="en">🇬🇧 English</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">📋 Items per pagina</label>
                        <input type="number" id="settingItemsPerPage" min="5" max="100" 
                               class="input-premium w-full">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">📅 Datum formaat</label>
                        <select id="settingDateFormat" class="input-premium w-full">
                            <option value="DD-MM-YYYY">DD-MM-YYYY</option>
                            <option value="MM-DD-YYYY">MM-DD-YYYY</option>
                            <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">💰 Valuta</label>
                        <select id="settingCurrency" class="input-premium w-full">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                            <option value="GBP">GBP (£)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl">
                        <input type="checkbox" id="settingNotifications" class="w-5 h-5 text-bamboo-primary rounded">
                        <label class="text-sm font-semibold text-gray-700">🔔 Notificaties inschakelen</label>
                    </div>
                    <div class="flex gap-3 justify-end mt-6 pt-4 border-t">
                        <button onclick="closeUserSettingsWithConfirmation()" class="btn-ghost">
                            Annuleren
                        </button>
                        <button onclick="saveUserSettingsFromForm()" class="btn-bamboo">
                            <i class="fas fa-save mr-2"></i>Opslaan
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container mx-auto px-6 py-8 flex-grow">
        <!-- Content Area -->
        <div id="content" class="page-transition">
            <div class="card-glass text-center py-12">
                <div class="spinner-premium mx-auto mb-4"></div>
                <p class="text-gray-600 font-medium">Laden...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="appFooter" class="hidden bg-white border-t border-gray-200 mt-auto">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between text-sm text-gray-600">
                <p>© <span id="footerYear"></span> RiceDesk. Alle rechten voorbehouden.</p>
                <span class="badge-premium badge-success text-xs text-nowrap">v2.0 Premium</span>
            </div>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-6 right-6 z-50">
        <div class="toast-premium flex items-center gap-3 min-w-[300px]">
            <i id="toastIcon" class="text-2xl"></i>
            <span id="toastMessage" class="flex-1 font-medium"></span>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/customers.js"></script>
    <script src="js/invoices.js"></script>
    <script src="js/payments.js"></script>
    <script src="js/subscriptions.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
